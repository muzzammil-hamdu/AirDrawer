apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: airdrawer
  namespace: airdrawer
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: airdrawer
                port:
                  number: 80
