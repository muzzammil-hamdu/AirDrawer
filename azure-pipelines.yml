trigger:
  branches:
    include:
      - main

variables:
  # ── ACR ───────────────────────────────────────────────────
  acrName: 'mujjuacr1122'
  acrLoginServer: 'mujjuacr1122.azurecr.io'
  imageRepository: 'airdrawer'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'

  # ── AKS ───────────────────────────────────────────────────
  aksCluster: 'luminary-aks-cluster'
  aksResourceGroup: 'aks-luminary-rg'
  k8sNamespace: 'airdrawer'

  # ── Shared ────────────────────────────────────────────────
  serviceConnection: 'azure-service-connection'
  tag: '$(Build.BuildId)'

stages:

# ════════════════════════════════════════════════════════════
# STAGE 1 – Build & Push Docker image to ACR
# ════════════════════════════════════════════════════════════
- stage: Build
  displayName: 'Build & Push to ACR'
  jobs:
    - job: BuildAndPush
      displayName: 'Docker Build & Push'
      pool:
        name: 'projectpool'
      steps:

        # 1. Checkout source
        - checkout: self

        # 2. Build & Push using Azure CLI (uses azure-service-connection for ACR auth)
        - task: AzureCLI@2
          displayName: 'Build & Push Image to ACR'
          inputs:
            azureSubscription: '$(serviceConnection)'
            scriptType: 'bash'
            scriptLocation: 'inlineScript'
            inlineScript: |
              az acr login --name $(acrName)

              docker build \
                -t $(acrLoginServer)/$(imageRepository):$(tag) \
                -t $(acrLoginServer)/$(imageRepository):latest \
                -f $(dockerfilePath) .

              docker push $(acrLoginServer)/$(imageRepository):$(tag)
              docker push $(acrLoginServer)/$(imageRepository):latest

              echo "✅ Image pushed: $(acrLoginServer)/$(imageRepository):$(tag)"

        # 3. Publish k8s manifests as pipeline artifact
        - task: PublishPipelineArtifact@1
          displayName: 'Publish K8s Manifests'
          inputs:
            targetPath: '$(Build.SourcesDirectory)/k8s'
            artifact: 'manifests'
            publishLocation: 'pipeline'

# ════════════════════════════════════════════════════════════
# STAGE 2 – Deploy to luminary-aks-cluster
# ════════════════════════════════════════════════════════════
- stage: Deploy
  displayName: 'Deploy to AKS'
  dependsOn: Build
  condition: succeeded()
  jobs:
    - deployment: DeployToAKS
      displayName: 'Deploy AirDrawer to luminary-aks-cluster'
      pool:
        name: 'projectpool'
      environment: 'luminary-aks-cluster'
      strategy:
        runOnce:
          deploy:
            steps:

              # 1. Download manifests artifact
              - task: DownloadPipelineArtifact@2
                displayName: 'Download K8s Manifests'
                inputs:
                  artifactName: 'manifests'
                  downloadPath: '$(Pipeline.Workspace)/manifests'

              # 2. Create namespace (idempotent)
              - task: KubernetesManifest@1
                displayName: 'Create Namespace'
                inputs:
                  action: deploy
                  connectionType: azureResourceManager
                  azureSubscriptionConnection: '$(serviceConnection)'
                  azureResourceGroup: '$(aksResourceGroup)'
                  kubernetesCluster: '$(aksCluster)'
                  namespace: 'default'
                  manifests: '$(Pipeline.Workspace)/manifests/namespace.yaml'

              # 3. Create ACR image pull secret
              - task: KubernetesManifest@1
                displayName: 'Create ACR Pull Secret'
                inputs:
                  action: createSecret
                  connectionType: azureResourceManager
                  azureSubscriptionConnection: '$(serviceConnection)'
                  azureResourceGroup: '$(aksResourceGroup)'
                  kubernetesCluster: '$(aksCluster)'
                  namespace: '$(k8sNamespace)'
                  secretType: dockerRegistry
                  secretName: 'acr-secret'
                  dockerRegistryEndpoint: '$(serviceConnection)'

              # 4. Deploy all manifests (image tag injected dynamically)
              - task: KubernetesManifest@1
                displayName: 'Deploy to AKS'
                inputs:
                  action: deploy
                  connectionType: azureResourceManager
                  azureSubscriptionConnection: '$(serviceConnection)'
                  azureResourceGroup: '$(aksResourceGroup)'
                  kubernetesCluster: '$(aksCluster)'
                  namespace: '$(k8sNamespace)'
                  manifests: |
                    $(Pipeline.Workspace)/manifests/deployment.yaml
                    $(Pipeline.Workspace)/manifests/service.yaml
                    $(Pipeline.Workspace)/manifests/ingress.yaml
                  containers: '$(acrLoginServer)/$(imageRepository):$(tag)'
                  imagePullSecrets: 'acr-secret'
